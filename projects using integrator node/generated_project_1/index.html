<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Todo List</h1>
        <form id="todo-form">
            <input type="text" id="new-task-input" placeholder="Add a new task..." required>
            <button type="submit" id="add-task-button">Add Task</button>
        </form>
        <ul id="task-list">
            <!-- Todo items will be dynamically added here by JavaScript -->
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
