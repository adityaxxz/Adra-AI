<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USD to INR Converter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="converter-container">
        <h1>USD to INR Converter</h1>
        <div class="input-group"><label for="usd-amount">USD Amount:</label><input type="number" id="usd-amount"
                placeholder="Enter USD amount"></div>
        <div class="output-group"><label for="inr-amount">INR Amount:</label><input type="text" id="inr-amount" readonly
                placeholder="INR amount will appear here"></div><button id="convert-button">Convert</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
